<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#059669;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="120" fill="#ffffff" rx="8"/>

  <!-- Logo icon: Interlocking blocks representing optimization -->
  <g filter="url(#shadow)">
    <!-- Block 1: Primary optimization block -->
    <rect x="30" y="35" width="40" height="40" rx="6" fill="url(#grad1)" transform="rotate(-15 50 55)"/>
    
    <!-- Block 2: Secondary block -->
    <rect x="70" y="35" width="40" height="40" rx="6" fill="url(#grad2)" transform="rotate(10 90 55)"/>
    
    <!-- Block 3: Tertiary block -->
    <rect x="50" y="65" width="40" height="40" rx="6" fill="url(#grad1)" transform="rotate(-5 70 85)"/>
    
    <!-- Optimization arrow/flow -->
    <path d="M 85 45 L 95 55 L 85 65" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Text: optBlocks -->
  <g transform="translate(130, 72)">
    <text font-family="system-ui, -apple-system, sans-serif" font-size="42" font-weight="700" fill="#1e293b">
      <tspan font-family="system-ui, -apple-system, sans-serif" font-weight="700" fill="#2563eb">opt</tspan>
      <tspan font-family="system-ui, -apple-system, sans-serif" font-weight="700" fill="#7c3aed">Blocks</tspan>
    </text>
    <text font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#64748b" y="28">
      High-Performance Optimization Solvers
    </text>
  </g>

  <!-- Decorative elements -->
  <circle cx="280" cy="30" r="3" fill="#059669" opacity="0.6"/>
  <circle cx="295" cy="30" r="3" fill="#0891b2" opacity="0.6"/>
  <circle cx="310" cy="30" r="3" fill="#2563eb" opacity="0.6"/>
</svg>
